<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Administração - Convite</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #f5f5f5;
            align-items: flex-start;
            padding-top: 50px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Admin container hidden by default */
        .admin-container {
            display: none;
        }
        
        body { 
            display: block; 
            background-color: #f5f5f5;
        }
    </style>
</head>

<body>
    <script src="config.js"></script>
    
    <!-- Login Screen Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <img src="favicon.png" alt="Logo" class="login-logo" onerror="this.src='selo.png'">
            <h2>Acesso Administrativo</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="admin-email">E-mail</label>
                    <input type="email" id="admin-email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label for="admin-pass">Senha</label>
                    <input type="password" id="admin-pass" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn" style="margin-top: 25px;">Entrar no Painel</button>
            </form>
            <p id="login-error" style="color: #ff4444; margin-top: 15px; display: none;">E-mail ou senha incorretos.</p>
        </div>
    </div>

    <script>
        // Supabase Configuration with Auth
        const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY, {
            auth: { persistSession: true }
        });

        // Check if session exists
        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                document.getElementById('login-overlay').style.display = 'none';
                document.querySelector('.admin-container').style.display = 'block';
                renderRSVPs();
            }
        }

        checkSession();

        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-pass').value;
            
            const submitBtn = loginForm.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Autenticando...';

            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                loginError.textContent = error.message === 'Invalid login credentials' ? 'E-mail ou senha incorretos.' : error.message;
                loginError.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Entrar no Painel';
            } else {
                window.location.reload(); // Refresh to trigger checkSession and load data
            }
        });
    </script>

    <div class="admin-container">
        <div class="admin-header">
            <h1>Lista de Presença</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button class="btn-report" onclick="window.print()">
                    <span>📄</span> Gerar Relatório
                </button>
                <div id="total-guests" class="badge badge-success">Total: 0</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nome do Convidado</th>
                    <th>Acompanhantes</th>
                    <th>Data de Confirmação</th>
                    <th>Total no Convidados</th>
                    <th class="no-print">Ações</th>
                </tr>
            </thead>
            <tbody id="rsvp-table-body">
                <!-- Data will be populated here -->
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                renderRSVPs();
            }
        });

        async function renderRSVPs() {
            const tableBody = document.getElementById('rsvp-table-body');
            const totalBadge = document.getElementById('total-guests');
            
            // Load data from Supabase
            const { data: rsvps, error } = await _supabase
                .from('rsvps')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Erro completo do Supabase:', error);
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 40px; color: red;">
                    Erro ao carregar dados: ${error.message || 'Verifique as chaves e as permissões RLS no Supabase.'}
                </td></tr>`;
                return;
            }

            let totalCount = 0;

            if (!rsvps || rsvps.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;">Nenhuma confirmação até o momento.</td></tr>';
                totalBadge.textContent = `Total de Convidados: 0`;
                return;
            }

            tableBody.innerHTML = ''; // Clear current table

            rsvps.forEach((rsvp) => {
                const groupTotal = 1 + (rsvp.companions ? rsvp.companions.length : 0);
                totalCount += groupTotal;

                const row = document.createElement('tr');
                
                // Accordion logic for companions
                let companionsHtml = '';
                if (rsvp.companions && rsvp.companions.length > 0) {
                    companionsHtml = `
                        <div class="accordion-header" onclick="toggleAccordion(this)">
                            ${rsvp.companions.length} acompanhante(s)
                        </div>
                        <div class="accordion-content">
                            ${rsvp.companions.map((c, cIndex) => `
                                <span class="companion-tag">
                                    ${c} 
                                    <span class="no-print" style="cursor:pointer; color:#ff4444; margin-left:5px; font-weight:bold;" onclick="deleteCompanion(${rsvp.id}, ${cIndex})">×</span>
                                </span>`).join('')}
                        </div>
                    `;
                } else {
                    companionsHtml = '<span style="color: #999;">Nenhum</span>';
                }

                const dateDisplay = new Date(rsvp.created_at).toLocaleString('pt-BR');

                row.innerHTML = `
                    <td style="font-weight: 600;">${rsvp.name}</td>
                    <td>${companionsHtml}</td>
                    <td style="font-size: 0.85rem;">${dateDisplay}</td>
                    <td><span class="badge badge-success">${groupTotal}</span></td>
                    <td class="no-print">
                        <button class="btn-delete" onclick="deleteRSVP(${rsvp.id})">Excluir Tudo</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            totalBadge.textContent = `Total de Convidados: ${totalCount}`;
        }

        function toggleAccordion(element) {
            element.classList.toggle('active');
            const content = element.nextElementSibling;
            content.classList.toggle('show');
        }

        async function deleteRSVP(id) {
            if (confirm('Tem certeza que deseja excluir esta confirmação completa?')) {
                const { error } = await _supabase
                    .from('rsvps')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert('Erro ao excluir registro.');
                } else {
                    renderRSVPs();
                }
            }
        }

        async function deleteCompanion(rsvpId, companionIndex) {
            if (confirm('Deseja remover este acompanhante?')) {
                // Fetch current companions first
                const { data, error: fetchError } = await _supabase
                    .from('rsvps')
                    .select('companions')
                    .eq('id', rsvpId)
                    .single();

                if (fetchError) return;

                let companions = data.companions;
                companions.splice(companionIndex, 1);

                const { error: updateError } = await _supabase
                    .from('rsvps')
                    .update({ companions: companions })
                    .eq('id', rsvpId);

                if (updateError) {
                    alert('Erro ao atualizar acompanhantes.');
                } else {
                    renderRSVPs();
                }
            }
        }
    </script>
</body>

</html>
